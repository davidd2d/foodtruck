<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" fill="#f0f0f0"/>
  
  <!-- Food Truck body -->
  <rect x="50" y="120" width="300" height="100" rx="10" fill="#d4af37" stroke="#333" stroke-width="2"/>
  
  <!-- Food Truck cabin -->
  <rect x="50" y="80" width="100" height="50" rx="5" fill="#333" stroke="#333" stroke-width="2"/>
  
  <!-- Windshield -->
  <rect x="60" y="90" width="35" height="25" fill="#87ceeb" stroke="#333" stroke-width="1"/>
  
  <!-- Window -->
  <rect x="100" y="90" width="35" height="25" fill="#87ceeb" stroke="#333" stroke-width="1"/>
  
  <!-- Wheels -->
  <circle cx="100" cy="230" r="15" fill="#333" stroke="#333" stroke-width="2"/>
  <circle cx="300" cy="230" r="15" fill="#333" stroke="#333" stroke-width="2"/>
  
  <!-- Wheel details -->
  <circle cx="100" cy="230" r="8" fill="#666"/>
  <circle cx="300" cy="230" r="8" fill="#666"/>
  
  <!-- Axle -->
  <line x1="100" y1="220" x2="100" y2="230" stroke="#333" stroke-width="1"/>
  <line x1="300" y1="220" x2="300" y2="230" stroke="#333" stroke-width="1"/>
  
  <!-- Service window -->
  <rect x="180" y="130" width="60" height="50" fill="#fff8dc" stroke="#333" stroke-width="2"/>
  
  <!-- Window panes -->
  <line x1="210" y1="130" x2="210" y2="180" stroke="#333" stroke-width="1"/>
  <line x1="180" y1="155" x2="240" y2="155" stroke="#333" stroke-width="1"/>
  
  <!-- Text -->
  <text x="200" y="260" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#666">
    Food Truck
  </text>
  <text x="200" y="280" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#999">
    No image available
  </text>
</svg>