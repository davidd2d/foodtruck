<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Mots clés BI - Complet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: system-ui; padding: 20px; }
        .test-section { background: #f8f9fa; border-left: 4px solid #007bff; padding: 15px; margin: 15px 0; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .warning { color: #ffc107; }
        .info { color: #17a2b8; }
        .code { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
        pre { margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Test complet - Mots clés personnalisés BI</h1>
        
        <div class="test-section">
            <h3>Test 1: localStorage</h3>
            <button class="btn btn-sm btn-primary" onclick="testLocalStorage()">Tester localStorage</button>
            <div id="test1-output"></div>
        </div>
        
        <div class="test-section">
            <h3>Test 2: Simulation JavaScript</h3>
            <button class="btn btn-sm btn-primary" onclick="testJavaScript()">Tester JavaScript</button>
            <div id="test2-output"></div>
        </div>
        
        <div class="test-section">
            <h3>Test 3: Simuler getTargetingParams()</h3>
            <button class="btn btn-sm btn-primary" onclick="testGetTargetingParams()">Tester getTargetingParams</button>
            <div id="test3-output"></div>
        </div>
        
        <div class="test-section">
            <h3>Test 4: Vérifier les fichiers statiques</h3>
            <button class="btn btn-sm btn-primary" onclick="testStaticFiles()">Vérifier fichiers</button>
            <div id="test4-output"></div>
        </div>
        
        <div class="test-section">
            <h3>Test 5: Affichage complete</h3>
            <button class="btn btn-sm btn-primary" onclick="runAllTests()">TESTER TOUT</button>
            <div id="test5-output"></div>
        </div>
    </div>
    
    <script>
        function log(elementId, message, type = 'info') {
            const elem = document.getElementById(elementId);
            if (elem) {
                const span = document.createElement('div');
                span.classList.add(type);
                span.textContent = message;
                elem.appendChild(span);
            }
            console.log(`[${type.toUpperCase()}]`, message);
        }
        
        function testLocalStorage() {
            const output = 'test1-output';
            log(output, '---  localStorage TEST ---', 'info');
            
            try {
                // Test 1: Basic storage
                localStorage.setItem('test-key', 'test-value');
                const retrieved = localStorage.getItem('test-key');
                if (retrieved === 'test-value') {
                    log(output, '✓ localStorage setItem/getItem works', 'success');
                } else {
                    log(output, '✗ localStorage values don\'t match', 'error');
                }
                
                // Test 2: JSON storage
                const jsonData = {keywords: ['vegan', 'pizzeria']};
                localStorage.setItem('test-json', JSON.stringify(jsonData));
                const retrievedJson = JSON.parse(localStorage.getItem('test-json'));
                if (JSON.stringify(retrievedJson) === JSON.stringify(jsonData)) {
                    log(output, '✓ localStorage JSON parse works', 'success');
                } else {
                    log(output, '✗ JSON parse failed', 'error');
                }
                
                // Cleanup
                localStorage.removeItem('test-key');
                localStorage.removeItem('test-json');
                log(output, '✓ Cleanup done', 'success');
            } catch (e) {
                log(output, `✗ Error: ${e.message}`, 'error');
            }
        }
        
        function testJavaScript() {
            const output = 'test2-output';
            log(output, '--- JavaScript ENGINE TEST ---', 'info');
            
            try {
                // Test array spread
                const arr1 = ['a', 'b'];
                const arr2 = ['c', 'd'];
                const combined = [...arr1, ...arr2];
                if (combined.join(',') === 'a,b,c,d') {
                    log(output, '✓ Array spread operator works', 'success');
                } else {
                    log(output, '✗ Array spread failed', 'error');
                }
                
                // Test string operations
                const input = '  vegan, pizzeria, bio  ';
                const trimmed = input.trim();
                const split = trimmed.split(',');
                const mapped = split.map(s => s.trim());
                const result = mapped.join('|');
                if (result === 'vegan|pizzeria|bio') {
                    log(output, '✓ String operations work', 'success');
                } else {
                    log(output, `✗ String ops failed: got "${result}"`, 'error');
                }
                
                // Test arrow functions
                const testFunc = (x) => x * 2;
                if (testFunc(5) === 10) {
                    log(output, '✓ Arrow functions work', 'success');
                } else {
                    log(output, '✗ Arrow functions failed', 'error');
                }
            } catch (e) {
                log(output, `✗ Error: ${e.message}`, 'error');
            }
        }
        
        function testGetTargetingParams() {
            const output = 'test3-output';
            log(output, '--- getTargetingParams SIMULATION ---', 'info');
            
            try {
                // Simulate presets
                const selectedKeywords = ['festival', 'market'];
                
                // Simulate custom
                const customKeywords = ['vegan', 'pizzeria'];
                
                // Combine
                const allKeywords = [...selectedKeywords, ...customKeywords];
                
                // Build params
                const params = {
                    horizon_days: '90',
                    min_attendance: '0',
                    min_score: '0',
                    period: 'full_day',
                    limit: '5',
                    radius_km: '50',
                };
                
                if (allKeywords.length > 0) {
                    params.keywords = allKeywords.join(',');
                }
                
                log(output, `Selected keywords: ${selectedKeywords.join(', ')}`, 'info');
                log(output, `Custom keywords: ${customKeywords.join(', ')}`, 'info');
                log(output, `All keywords: ${allKeywords.join(', ')}`, 'info');
                log(output, `Final keywords param: "${params.keywords}"`, params.keywords ? 'success' : 'warning');
                
                // Test with no keywords
                const paramsEmpty = {...params};
                delete paramsEmpty.keywords;
                log(output, `✓ With no keywords, param is skipped (as expected)`, 'success');
                
            } catch (e) {
                log(output, `✗ Error: ${e.message}`, 'error');
            }
        }
        
        function testStaticFiles() {
            const output = 'test4-output';
            log(output, '--- STATIC FILES TEST ---', 'info');
            
            try {
                // Check if files can be loaded
                const jsPath = '/static/js/dashboard/business_intelligence.js';
                const cssPath = '/static/foodtrucks/css/dashboard.css';
                
                log(output, `JavaScript: ${jsPath}`, 'info');
                log(output, `CSS: ${cssPath}`, 'info');
                
                fetch(jsPath, {method: 'HEAD'})
                    .then(r => {
                        if (r.ok) {
                            log(output, `✓ JS file accessible (${r.status})`, 'success');
                        } else {
                            log(output, `✗ JS file returned ${r.status}`, 'warning');
                        }
                    })
                    .catch(e => log(output, `✗ JS fetch error: ${e.message}`, 'error'));
            } catch (e) {
                log(output, `✗ Error: ${e.message}`, 'error');
            }
        }
        
        function runAllTests() {
            const output = 'test5-output';
            log(output, '====  FULL TEST RUN ====', 'info');
            
            testLocalStorage();
            testJavaScript();
            testGetTargetingParams();
            testStaticFiles();
            
            log(output, '', 'info');
            log(output, '✓ All tests completed', 'success');
            log(output, 'Check console for additional details', 'info');
        }
    </script>
</body>
</html>
