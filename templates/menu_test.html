<!DOCTYPE html>
<html>
<head>
    <title>Menu API Test</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container mt-5">
        <h1>Menu API Test</h1>
        <button class="btn btn-primary" onclick="testMenuAPI()">Test Menu API</button>
        <div id="result" class="mt-3"></div>
    </div>

    <script>
        async function testMenuAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Loading...</p>';
            
            try {
                const response = await fetch('/api/foodtrucks/cucina-di-pastaz/menu/');
                console.log('Response status:', response.status);
                
                const data = await response.json();
                console.log('API Response:', data);
                
                if (data.categories && data.categories.length > 0) {
                    let html = `<h3>✓ Menu loaded successfully</h3>`;
                    html += `<p>Categories: ${data.categories.length}</p>`;
                    data.categories.forEach(cat => {
                        html += `<p>- ${cat.name}: ${cat.items.length} items</p>`;
                    });
                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.innerHTML = `<p class="text-danger">No categories found</p><pre>${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<p class="text-danger">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
