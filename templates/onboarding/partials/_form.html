{% load i18n %}
<!-- Import Form Partial -->
<div class="mb-4">
    <label for="raw_text" class="form-label h5">{% trans "Content" %} <span class="text-danger">*</span></label>
    <textarea
        class="form-control"
        id="raw_text"
        name="raw_text"
        rows="6"
        placeholder="{% trans "Paste your foodtruck description, menu, or any relevant text here..." %}"
        required
    ></textarea>
    <div class="form-text">{% trans "Copy from your Instagram, website, or any text describing your foodtruck." %}</div>
</div>

<div class="mb-4">
    <label for="images" class="form-label h5">{% trans "Images" %} ({% trans "Optional" %})</label>
    <input
        type="file"
        class="form-control"
        id="images"
        name="images"
        multiple
        accept="image/*"
    >
    <div class="form-text">{% trans "Upload menu photos, logo, or any relevant images." %}</div>
    <div id="image-preview" class="mt-3"></div>
</div>

<div class="mb-4">
    <label for="source_url" class="form-label">{% trans "Reference URL" %} ({% trans "Optional" %})</label>
    <input
        type="url"
        class="form-control"
        id="source_url"
        name="source_url"
        placeholder="{% trans "https://instagram.com/yourfoodtruck" %}"
    >
    <div class="form-text">{% trans "Link to your social media or website (for reference only)." %}</div>
</div>
