<!-- Import Form Partial -->
<div class="mb-4">
    <label for="raw_text" class="form-label h5">Content <span class="text-danger">*</span></label>
    <textarea
        class="form-control"
        id="raw_text"
        name="raw_text"
        rows="6"
        placeholder="Paste your foodtruck description, menu, or any relevant text here..."
        required
    ></textarea>
    <div class="form-text">Copy from your Instagram, website, or any text describing your foodtruck</div>
</div>

<div class="mb-4">
    <label for="images" class="form-label h5">Images (Optional)</label>
    <input
        type="file"
        class="form-control"
        id="images"
        name="images"
        multiple
        accept="image/*"
    >
    <div class="form-text">Upload menu photos, logo, or any relevant images</div>
    <div id="image-preview" class="mt-3"></div>
</div>

<div class="mb-4">
    <label for="source_url" class="form-label">Reference URL (Optional)</label>
    <input
        type="url"
        class="form-control"
        id="source_url"
        name="source_url"
        placeholder="https://instagram.com/yourfoodtruck"
    >
    <div class="form-text">Link to your social media or website (for reference only)</div>
</div>
