<!-- Menu Preview Partial -->
<div class="card mb-4">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h3 class="mb-0">Menu</h3>
        <button class="btn btn-outline-primary btn-sm" id="add-category-btn">
            <i class="bi bi-plus-circle me-1"></i>Add Category
        </button>
    </div>
    <div class="card-body">
        <div id="menu-content">
            {% for category in menu %}
            <div class="category-section mb-4" data-category-index="{{ forloop.counter0 }}">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0">
                        <span class="editable-field category-name" data-field="menu.{{ forloop.counter0 }}.category" contenteditable="true">{{ category.category }}</span>
                    </h4>
                    <button class="btn btn-outline-danger btn-sm remove-category-btn">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>

                <div class="menu-items">
                    {% for item in category.items %}
                    <div class="menu-item" data-item-index="{{ forloop.counter0 }}">
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <label class="form-label fw-bold">Name</label>
                                <div class="editable-field" data-field="menu.{{ forloop.parentloop.counter0 }}.items.{{ forloop.counter0 }}.name" contenteditable="true">{{ item.name }}</div>
                            </div>
                            <div class="col-md-3 mb-2">
                                <label class="form-label fw-bold">Price</label>
                                <div class="editable-field" data-field="menu.{{ forloop.parentloop.counter0 }}.items.{{ forloop.counter0 }}.price" contenteditable="true">${{ item.price|default:"0.00" }}</div>
                            </div>
                            <div class="col-md-3 mb-2 d-flex align-items-end">
                                <button class="btn btn-outline-danger btn-sm remove-item-btn">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                        <div class="mb-2">
                            <label class="form-label fw-bold">Description</label>
                            <div class="editable-field" data-field="menu.{{ forloop.parentloop.counter0 }}.items.{{ forloop.counter0 }}.description" contenteditable="true">{{ item.description|default:"" }}</div>
                        </div>
                    </div>
                    {% endfor %}

                    <button class="btn add-item-btn w-100" data-category-index="{{ forloop.parentloop.counter0 }}">
                        <i class="bi bi-plus-circle me-2"></i>Add Menu Item
                    </button>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>
