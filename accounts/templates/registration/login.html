{% extends "core/basic.html" %}
{% load static %}
{% block content %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">

<div class="login-container">
  <h2>Connexion</h2>
  <h1>Je suis le bon login !</h1>
  <form method="post">
    {% csrf_token %}
    <label for="id_username">Email :</label>
    <input type="email" name="username" id="id_username" required value="{{ form.username.value|default:'' }}">

    <label for="id_password">Mot de passe :</label>
    <input type="password" name="password" id="id_password" required>

    <button type="submit">Se connecter</button>

    <div class="password-reset">
      Mot de passe oublié ? <a href="{% url 'accounts:password_reset' %}">Cliquez ici pour le réinitialiser.</a>
    </div>
  </form>
</div>
{% endblock %}
