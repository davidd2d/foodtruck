{% load i18n %}
<div class="card shadow-sm">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h3 class="h5 mb-1">{% trans "Menu" %}</h3>
                <p class="text-muted mb-0">{% trans "Choose meals, customize with options, then add them to your cart." %}</p>
            </div>
            <span class="badge bg-success">{% trans "Live menu" %}</span>
        </div>

        <div id="category-shortcuts" class="category-nav d-flex flex-nowrap overflow-auto gap-2 mb-3"></div>

        <div id="menu-container" class="border rounded p-3 bg-white" style="min-height: 260px;">
            <div class="text-center text-muted py-5">
                <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
                <p class="mt-3 mb-0">{% trans "Loading menu…" %}</p>
            </div>
        </div>
    </div>
</div>
