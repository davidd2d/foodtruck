{% load i18n %}
<section class="card border-0 shadow-sm h-100">
    <div class="card-header bg-white border-0">
        <h2 class="h5 mb-0 d-flex align-items-center gap-1">
            <span>{% trans "Top menu performance" %}</span>
            <button type="button" class="indicator-help-trigger" data-indicator-key="top_menu_performance" data-indicator-title="{% trans 'Top menu performance' %}" data-bs-toggle="modal" data-bs-target="#dashboard-indicator-help-modal" aria-label="{% trans 'Indicator definition' %}">i</button>
        </h2>
    </div>
    <div class="card-body pb-0">
        <canvas id="dashboard-menu-category-chart" height="180"></canvas>
    </div>
    <div class="table-responsive">
        <table class="table table-sm mb-0 align-middle">
            <thead>
                <tr>
                    <th>{% trans "Item" %}</th>
                    <th class="text-end">{% trans "Qty" %}</th>
                    <th class="text-end">{% trans "Revenue" %}</th>
                </tr>
            </thead>
            <tbody id="dashboard-menu-body"></tbody>
        </table>
    </div>
</section>
