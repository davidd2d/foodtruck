{% load i18n %}
<section class="card border-0 shadow-sm h-100">
    <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center">
        <h2 class="h5 mb-0 d-flex align-items-center gap-1">
            <span>{% trans "Recent paid orders" %}</span>
            <button type="button" class="indicator-help-trigger" data-indicator-key="recent_paid_orders" data-indicator-title="{% trans 'Recent paid orders' %}" data-bs-toggle="modal" data-bs-target="#dashboard-indicator-help-modal" aria-label="{% trans 'Indicator definition' %}">i</button>
        </h2>
        <button type="button" class="btn btn-sm btn-outline-primary" id="dashboard-orders-refresh">{% trans "Refresh" %}</button>
    </div>
    <div class="table-responsive">
        <table class="table table-sm table-hover mb-0 align-middle">
            <thead>
                <tr>
                    <th>#</th>
                    <th>{% trans "Status" %}</th>
                    <th>{% trans "Paid at" %}</th>
                    <th>{% trans "Pickup" %}</th>
                    <th class="text-end">{% trans "Amount" %}</th>
                </tr>
            </thead>
            <tbody id="dashboard-orders-body"></tbody>
        </table>
    </div>
</section>
