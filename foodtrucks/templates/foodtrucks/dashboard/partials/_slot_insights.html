{% load i18n %}
<section class="card border-0 shadow-sm">
    <div class="card-header bg-white border-0">
        <h2 class="h5 mb-0 d-flex align-items-center gap-1">
            <span>{% trans "Slot insights" %}</span>
            <button type="button" class="indicator-help-trigger" data-indicator-key="slot_insights" data-indicator-title="{% trans 'Slot insights' %}" data-bs-toggle="modal" data-bs-target="#dashboard-indicator-help-modal" aria-label="{% trans 'Indicator definition' %}">i</button>
        </h2>
    </div>
    <div class="card-body">
        <h3 class="h6 text-danger">{% trans "Underperforming" %}</h3>
        <div id="dashboard-insights-underperforming" class="small mb-3"></div>

        <h3 class="h6 text-success">{% trans "Optimal" %}</h3>
        <div id="dashboard-insights-optimal" class="small mb-3"></div>

        <h3 class="h6 text-warning">{% trans "Saturated" %}</h3>
        <div id="dashboard-insights-saturated" class="small mb-0"></div>
    </div>
</section>
