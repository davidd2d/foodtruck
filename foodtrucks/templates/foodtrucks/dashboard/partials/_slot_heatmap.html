{% load i18n %}
<section class="card border-0 shadow-sm h-100">
    <div class="card-header bg-white border-0 d-flex justify-content-between align-items-center">
        <h2 class="h5 mb-0 d-flex align-items-center gap-1">
            <span>{% trans "Slot heatmap" %}</span>
            <button type="button" class="indicator-help-trigger" data-indicator-key="slot_heatmap" data-indicator-title="{% trans 'Slot heatmap' %}" data-bs-toggle="modal" data-bs-target="#dashboard-indicator-help-modal" aria-label="{% trans 'Indicator definition' %}">i</button>
        </h2>
        <span class="small text-muted">{% trans "Orders by weekday and hour" %}</span>
    </div>
    <div class="card-body">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-2">
            <div class="heatmap-legend" aria-hidden="true">
                <span class="small text-muted me-2">{% trans "Low" %}</span>
                <span class="heatmap-legend-swatch heatmap-intensity-0"></span>
                <span class="heatmap-legend-swatch heatmap-intensity-1"></span>
                <span class="heatmap-legend-swatch heatmap-intensity-2"></span>
                <span class="heatmap-legend-swatch heatmap-intensity-3"></span>
                <span class="heatmap-legend-swatch heatmap-intensity-4"></span>
                <span class="small text-muted ms-2">{% trans "High" %}</span>
            </div>
            <span class="small text-muted">{% trans "Scroll horizontally to view all hours" %}</span>
        </div>

        <div class="slot-heatmap-scroll" role="region" aria-label="{% trans 'Slot heatmap grid' %}">
            <div id="dashboard-slot-heatmap" class="slot-heatmap-grid" aria-label="{% trans 'Slot heatmap' %}"></div>
        </div>

        <div class="mt-3 table-responsive">
            <table class="table table-sm mb-0 align-middle">
                <thead>
                    <tr>
                        <th>{% trans "Hour" %}</th>
                        <th class="text-end">{% trans "Orders" %}</th>
                        <th class="text-end">{% trans "Revenue" %}</th>
                        <th class="text-end">{% trans "Average order value" %}</th>
                    </tr>
                </thead>
                <tbody id="dashboard-hourly-performance-body"></tbody>
            </table>
        </div>
    </div>
</section>
